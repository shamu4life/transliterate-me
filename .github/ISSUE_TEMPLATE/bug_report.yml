name: Bug report
description: Something is broken or behaving incorrectly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: >
        A clear, concise description of the bug. Note that transliteration here is
        *phonetic* and lossy by design — it reproduces how text sounds, not its
        meaning — so output that looks wrong but plausible (a collapsed sound, an
        approximate Chinese character) may be expected. Flag it anyway if it seems
        off and we'll confirm.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app is affected?
      options:
        - Forward (Latin language → world script)
        - Romanize (world script → Latin)
        - Pronunciation / IPA accuracy
        - A specific source language
        - A specific target script
        - Vendoring / setup (vendor.sh, espeak, kuromoji)
        - Web UI / layout
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: input-text
    attributes:
      label: Input text
      description: The exact text that misbehaved, so we can reproduce it. Paste it verbatim.
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "e.g. Chrome 124, Safari 17.4, Firefox 125"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS & version
      placeholder: "e.g. iOS 17.4, Android 15, macOS 14.4, Windows 11"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Console errors, the source language and target script in use, screenshots, screen recordings — anything that helps.
    validations:
      required: false
