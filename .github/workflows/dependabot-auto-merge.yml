# Auto-merge Dependabot pull requests once CI is green.
#
# Runs after the "CI" workflow finishes. If that run was for a Dependabot pull
# request and it succeeded, the matching PR is merged. Gating on the CI run's
# success (via workflow_run) means no branch-protection rule is required, and
# the actor/author checks ensure only Dependabot PRs are ever touched.
name: Dependabot auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Merge the Dependabot PR for this branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr=$(gh pr list -R "$REPO" --head "$BRANCH" --state open \
            --json number,author \
            --jq 'map(select(.author.login == "app/dependabot")) | .[0].number // empty')
          if [ -z "$pr" ]; then
            echo "No open Dependabot PR for branch $BRANCH; nothing to do."
            exit 0
          fi
          echo "CI passed for Dependabot PR #$pr — merging."
          gh pr merge -R "$REPO" --merge --delete-branch "$pr"
