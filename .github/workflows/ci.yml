name: CI

# Runs the test suite on pushes to main and on pull requests. Deployment is
# handled by Cloudflare Workers Builds (see wrangler.toml), so there is no
# deploy job here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm test
